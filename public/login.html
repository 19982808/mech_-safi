<!DOCTYPE html>
<html>
<head>
  <title>Login - MECH SAFI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>

<body>

<div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:12px;">

  <h2>🔧 MECH SAFI LOGIN</h2>

  <input id="email" placeholder="Email" style="padding:10px;width:250px"/>
  <input id="password" type="password" placeholder="Password" style="padding:10px;width:250px"/>

  <button onclick="login()" style="background:#FF6B1A;color:white;border:0;padding:10px 25px;border-radius:8px">
    Login
  </button>

  <a href="register.html" style="color:#FF6B1A;font-size:13px">Create account</a>

</div>

<script>
async function login(){

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const {error}=await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  location.href="dashboard.html";
}
</script>

</body>
</html>
